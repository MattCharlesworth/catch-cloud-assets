name: Daily Headlines Update

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 6:00 AM UTC every day
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  update-headlines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests google-genai duckduckgo-search

      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add headlines.json
          # Only commit if the file actually changed
          git commit -m "Automated daily news update" || echo "No changes to commit"
          git push
